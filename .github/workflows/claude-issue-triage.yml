name: Claude Issue Triage

on:
  issues:
    types: [opened, edited]

jobs:
  triage:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Triage issue with Claude
        id: claude-triage
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}

          prompt: |
            Analiza el issue #${{ github.event.issue.number }} de este repositorio (un juego de Tetris en JavaScript vanilla, ver CLAUDE.md para arquitectura).

            Tu tarea:
            1. Lee el título y la descripción del issue.
            2. Revisa las etiquetas (labels) ya existentes en el repositorio con `gh label list` y aplica las que correspondan con `gh issue edit ${{ github.event.issue.number }} --add-label "..."` (por ejemplo: bug, enhancement, documentation, question, good first issue, help wanted, duplicate, invalid, wontfix). No crees labels nuevas salvo que sea claramente necesario.
            3. Publica un comentario en el issue con `gh issue comment ${{ github.event.issue.number }} --body "..."` que contenga un diagnóstico general en español con esta estructura:
               - **Resumen del problema**: qué se reporta.
               - **Área afectada**: qué parte del código probablemente está involucrada (por ejemplo: lógica de colisión, rotación, line clear, scoring, render, UI/HTML/CSS), basándote en la arquitectura descrita en CLAUDE.md.
               - **Posible causa raíz**: hipótesis razonada sin necesidad de implementar la solución todavía.
               - **Próximos pasos sugeridos**: pasos concretos que el equipo podría seguir para implementar la corrección o feature.
            4. Si el issue no tiene suficiente información para diagnosticar, indícalo explícitamente en el comentario y pide los datos faltantes (pasos para reproducir, navegador, captura, etc.) en lugar de inventar una causa.

            El comentario que publiques debe estar escrito en formato Markdown válido y bien renderizable por GitHub (encabezados con `##`/`###`, listas con `-`, bloques de código con ``` cuando incluyas fragmentos de código, **negritas** para resaltar términos clave, etc.).

            No modifiques código ni abras pull requests, esta tarea es solo de triage y diagnóstico.

          claude_args: |
            --allowed-tools "Read,Glob,Grep,Bash(gh issue edit:*),Bash(gh issue comment:*),Bash(gh label list:*)"
